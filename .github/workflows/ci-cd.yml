name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main", "production" ]

jobs:
  # ============================================================================
  # JOB 1: Continuous Integration (Lints, TypeScript Checks & Build Validation)
  # ============================================================================
  validate-and-test:
    name: Code Validation & Compile Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package.json
            web/package.json

      - name: Validate Backend Server
        run: |
          cd server
          npm install --legacy-peer-deps
          npx prisma generate
          npm run build

      - name: Validate Frontend Next.js Web
        run: |
          cd web
          npm install --legacy-peer-deps
          npm run build

  # ============================================================================
  # JOB 2: Docker Validation (Verifies Dockerfile Compiles with Layer Caching)
  # ============================================================================
  docker-dry-run:
    name: Docker Build Validation (Dry-Run)
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Nginx Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: false
          tags: blacktree-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Backend Server Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: blacktree-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Frontend Web Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          tags: blacktree-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # JOB 3: Continuous Deployment (Triggers VPS deployment on masrafi or main branches)
  # ============================================================================
  deploy-to-vps:
    name: Deploy to VPS Server
    needs: docker-dry-run
    if: github.event_name == 'push' && (github.ref == 'refs/heads/production' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: SSH VPS & Auto Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "🚀 Starting deployment for branch: ${{ github.ref_name }}..."
            cd /var/www/blacktree-tv
            
            # Pull the latest changes from Git
            git pull origin ${{ github.ref_name }}
            
            # Build and deploy the Docker containers in detached mode
            docker compose up --build -d
            
            # Deploy database schema migrations
            docker compose exec -T server bun run prisma migrate deploy
            
            echo "🎉 Deployment successful!"
