services:
  nginx:
    build:
      context: ./nginx
    container_name: blacktree-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_started
    networks:
      - blacktree-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./web
    container_name: blacktree-web
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
      - ./web/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - server
    networks:
      - blacktree-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M 

  server:
    build:
      context: ./server
    container_name: blacktree-server
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=prefer
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy 
      redis:
        condition: service_started
    networks:
      - blacktree-network
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G

  db:
    image: postgres:17-alpine
    container_name: blacktree-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_HOST_IP:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blacktree-network
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blacktree-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} 
    volumes:
      - redis-data:/data
    networks:
      - blacktree-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

volumes:
  redis-data:
  postgres-data:

networks:
  blacktree-network:
    driver: bridge
